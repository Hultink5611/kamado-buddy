name: EAS Android build

# Bouwt een installeerbare Android-APK op Expo's servers — geen laptop en geen
# lokale Android SDK nodig. Deze GitHub-runner triggert de build alleen; de
# eigenlijke compilatie draait op Expo (EAS), die APK-download-link komt in je
# Expo-dashboard en per e-mail.
#
# Draait:
#   - handmatig via de "Run workflow"-knop (Actions-tab), waar je het profiel
#     kiest: 'preview' (standalone APK — installeren en meteen gebruiken) of
#     'development' (dev-client — vereist een draaiende Metro-server, `npm start`).
#   - automatisch bij push naar main als native-relevante bestanden wijzigen.
#
# Eenmalige setup: maak een Expo-account (https://expo.dev), maak daar een
# access token (Account settings -> Access tokens), en zet 'm in deze repo als
# secret EXPO_TOKEN (Settings -> Secrets and variables -> Actions).
on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build-profiel'
        type: choice
        default: preview
        options:
          - preview
          - development
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
      - 'eas.json'
      - '.github/workflows/eas-android.yml'
      - 'android/**'
      - 'ios/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Controleer EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN-secret ontbreekt. Voeg 'm toe onder Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Init/link Expo project (idempotent)
        # Maakt het project bij de eerste run aan onder jouw account en zet de
        # projectId in app.json; latere runs linken simpelweg opnieuw.
        run: eas init --non-interactive --force

      - name: Persist projectId back to the repo (best effort)
        continue-on-error: true
        run: |
          if ! git diff --quiet -- app.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add app.json
            git commit -m "chore: set EAS projectId [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Build Android APK
        # Bij handmatig starten wordt het gekozen profiel gebruikt; bij een
        # push naar main default naar 'preview' (standalone APK).
        run: eas build --platform android --profile "${{ github.event.inputs.profile || 'preview' }}" --non-interactive --no-wait
        # --no-wait: de runner wacht niet op de hele build-wachtrij; de
        # download-link verschijnt in het Expo-dashboard en per e-mail.
